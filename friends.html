<!DOCTYPE html>
<html>
<head>
  <title>REALM Friends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b1f3a;
      color:white;
      min-height:100vh;
      padding:20px;
    }

    header {
      background:#08172b;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      margin-bottom: 15px;
    }

    h2 {
      margin-top:20px;
      margin-bottom:10px;
      font-size:18px;
      border-bottom:1px solid #1a3c6e;
      padding-bottom:5px;
    }

    .user-card, .request-card {
      padding:10px;
      background:#132f57;
      margin-bottom:5px;
      border-radius:8px;
      display:flex;
      justify-content: space-between;
      align-items:center;
      cursor:pointer;
      transition:0.2s;
    }

    .user-card:hover, .request-card:hover { background:#1a3c6e; }

    button {
      padding:5px 10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      margin-left:5px;
    }

    .add-btn { background:#1e90ff; color:white; }
    .accept-btn { background:#28a745; color:white; }
    .decline-btn { background:#ff4d4d; color:white; }

    .back { display:block; text-align:center; padding:10px; background:#132f57; text-decoration:none; color:white; margin-top:20px; border-radius:8px; }
  </style>
</head>
<body>

<header>REALM Friends</header>

<h2>All Users</h2>
<div id="usersList">Loading users...</div>

<h2>Friend Requests</h2>
<div id="friendRequests">Loading friend requests...</div>

<a href="dashboard.html" class="back">⬅ Back to Dashboard</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
  authDomain: "realm-5de9c.firebaseapp.com",
  projectId: "realm-5de9c",
  storageBucket: "realm-5de9c.appspot.com",
  messagingSenderId: "272718937770",
  appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUid = null;

onAuthStateChanged(auth, user => {
  if(!user) { window.location.href = "index.html"; return; }
  currentUid = user.uid;
  loadUsers();
  loadFriendRequests();
});

// Load all users (to add as friends)
async function loadUsers(){
  const usersSnap = await getDocs(collection(db, "users"));
  const usersListDiv = document.getElementById("usersList");
  usersListDiv.innerHTML = "";

  usersSnap.forEach(docSnap => {
    const user = docSnap.data();
    if(user.uid === currentUid) return; // skip self

    const div = document.createElement("div");
    div.classList.add("user-card");
    div.textContent = user.username + " (" + user.email + ")";

    const btn = document.createElement("button");
    btn.classList.add("add-btn");
    btn.textContent = "Add Friend";
    btn.onclick = async () => {
      // Create friend request
      await addDoc(collection(db, "friendRequests"), {
        from: currentUid,
        to: docSnap.id,
        status: "pending"
      });
      btn.textContent = "Request Sent";
      btn.disabled = true;
    }

    div.appendChild(btn);
    usersListDiv.appendChild(div);
  });
}

// Load friend requests
async function loadFriendRequests(){
  const q = query(collection(db, "friendRequests"), where("to", "==", currentUid), where("status", "==", "pending"));
  const snapshot = await getDocs(q);
  const requestsDiv = document.getElementById("friendRequests");
  requestsDiv.innerHTML = "";

  snapshot.forEach(docSnap => {
    const req = docSnap.data();
    const div = document.createElement("div");
    div.classList.add("request-card");
    div.textContent = req.from; // will replace with username

    const acceptBtn = document.createElement("button");
    acceptBtn.classList.add("accept-btn");
    acceptBtn.textContent = "Accept";
    acceptBtn.onclick = async () => {
      // Update request status
      await updateDoc(doc(db, "friendRequests", docSnap.id), { status: "accepted" });
      // Add to connections collection
      await addDoc(collection(db, "connections"), { users: [req.from, currentUid] });
      div.remove();
    }

    const declineBtn = document.createElement("button");
    declineBtn.classList.add("decline-btn");
    declineBtn.textContent = "Decline";
    declineBtn.onclick = async () => {
      await updateDoc(doc(db, "friendRequests", docSnap.id), { status: "declined" });
      div.remove();
    }

    div.appendChild(acceptBtn);
    div.appendChild(declineBtn);
    requestsDiv.appendChild(div);
  });
}
</script>

</body>
</html>
