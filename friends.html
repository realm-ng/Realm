<!DOCTYPE html>
<html>
  <head>
	<title>Friends - REALM</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b1f3a;
      color:white;
      padding:20px;
    }

    h2 { text-align:center; }

    .user-card {
      background:#08172b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button {
      padding:5px 10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button.add { background:#1e90ff; color:white; }
    button.pending { background:orange; color:white; cursor:default; }
    button.accept { background:green; color:white; }
    button.decline { background:red; color:white; }
    button.back { background:gray; color:white; width:100%; margin-top:20px; }
</style>
  </head>
  <body>

	<h2>All Users</h2>
	<div id="usersList">Loading users...</div>
	<h2>Friend Requests</h2>
	<div id="requestsList">Loading requests...</div>
	<button class="back" onclick="goBack()">⬅ Back to Dashboard</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
  authDomain: "realm-5de9c.firebaseapp.com",
  projectId: "realm-5de9c",
  storageBucket: "realm-5de9c.firebasestorage.app",
  messagingSenderId: "272718937770",
  appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, async user=>{
  if(!user){
    window.location.href="index.html";
  } else {
    currentUser = user;
    loadUsers();
    loadRequests();
  }
});

// Load all users (except current user)
async function loadUsers(){
  const usersSnap = await getDocs(collection(db,"users"));
  const connSnap = await getDocs(collection(db,"connections"));

  const usersListDiv = document.getElementById("usersList");
  usersListDiv.innerHTML = "";

  usersSnap.forEach(u=>{
    if(u.id === currentUser.uid) return; // skip self

    // Check connection status
    let btnText = "Add Friend";
    let btnClass = "add";
    connSnap.forEach(c=>{
      const data = c.data();
      if((data.from === currentUser.uid && data.to === u.id) ||
         (data.to === currentUser.uid && data.from === u.id)){
        if(data.status==="pending"){
          btnText = "Pending";
          btnClass = "pending";
        } else if(data.status==="accepted"){
          btnText = "Friends";
          btnClass = "pending";
        }
      }
    });

    const div = document.createElement("div");
    div.classList.add("user-card");
    div.innerHTML = `<span>${u.data().username}</span>`;
    const btn = document.createElement("button");
    btn.innerText = btnText;
    btn.className = btnClass;
    if(btnText==="Add Friend"){
      btn.onclick = ()=>sendRequest(u.id);
    }
    div.appendChild(btn);
    usersListDiv.appendChild(div);
  });
}

// Send friend request
async function sendRequest(toUid){
  await addDoc(collection(db,"connections"),{
    from: currentUser.uid,
    to: toUid,
    status: "pending"
  });
  alert("Friend Request Sent!");
  loadUsers();
  loadRequests();
}

// Load pending requests
async function loadRequests(){
  const q = query(collection(db,"connections"), where("to","==",currentUser.uid));
  const snap = await getDocs(q);
  const requestsDiv = document.getElementById("requestsList");
  requestsDiv.innerHTML = "";
  snap.forEach(async c=>{
    const data = c.data();
    if(data.status!=="pending") return;
    // get sender username
    const userDoc = await getDocs(query(collection(db,"users"), where("__name__","==",data.from)));
    let username = "Unknown";
    userDoc.forEach(u=>{ username = u.data().username; });

    const div = document.createElement("div");
    div.classList.add("user-card");
    div.innerHTML = `<span>${username}</span>`;

    const acceptBtn = document.createElement("button");
    acceptBtn.className="accept";
    acceptBtn.innerText="Accept";
    acceptBtn.onclick=async ()=>{
      await updateDoc(doc(db,"connections",c.id),{status:"accepted"});
      loadUsers();
      loadRequests();
    };

    const declineBtn = document.createElement("button");
    declineBtn.className="decline";
    declineBtn.innerText="Decline";
    declineBtn.onclick=async ()=>{
      await updateDoc(doc(db,"connections",c.id),{status:"declined"});
      loadUsers();
      loadRequests();
    };

    div.appendChild(acceptBtn);
    div.appendChild(declineBtn);
    requestsDiv.appendChild(div);
  });
}

function goBack(){ window.location.href="dashboard.html"; }

</script>
  </body>
</html>
