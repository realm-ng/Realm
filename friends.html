<!DOCTYPE html>
<html>
<head>
  <title>REALM - Friends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family:Arial;
      background: linear-gradient(145deg,#0b1f3a,#102a52);
      color:white;
      padding:20px;
    }

    h2{
      margin-top:30px;
    }

    input{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      margin-bottom:15px;
      font-size:16px;
    }

    .user-card, .request-card{
      background:#132f57;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button{
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .add-btn{
      background:#28a745;
      color:white;
    }

    .accept-btn{
      background:#28a745;
      color:white;
      margin-left:5px;
    }

    .decline-btn{
      background:#dc3545;
      color:white;
      margin-left:5px;
    }

    .back-btn{
      margin-top:20px;
      background:#999;
      color:black;
    }
  </style>
</head>
<body>

<h1>Friends</h1>

<input type="text" id="searchInput" placeholder="Search users by username..." oninput="searchUsers()">
<div id="searchResults"></div>

<h2>Friend Requests</h2>
<div id="friendRequests"></div>

<button class="back-btn" onclick="location.href='dashboard.html'">Back</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
import { 
  getFirestore, collection, getDocs, query, where,
  addDoc, updateDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
  authDomain: "realm-5de9c.firebaseapp.com",
  projectId: "realm-5de9c",
  storageBucket: "realm-5de9c.firebasestorage.app",
  messagingSenderId: "272718937770",
  appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUid;

auth.onAuthStateChanged(user=>{
  if(user){
    currentUid = user.uid;
    loadFriendRequests();
  }else{
    location.href="index.html";
  }
});


// 🔍 SEARCH USERS
window.searchUsers = async function(){
  const searchText = document.getElementById("searchInput").value.toLowerCase();
  const resultsDiv = document.getElementById("searchResults");
  resultsDiv.innerHTML = "";

  if(searchText.length < 2) return;

  const snapshot = await getDocs(collection(db,"users"));

  snapshot.forEach(async (docSnap)=>{
    const user = docSnap.data();

    if(user.uid === currentUid) return;

    if(user.username.toLowerCase().includes(searchText)){
      
      // Prevent duplicate pending request
      const existingQuery = query(
        collection(db,"friendRequests"),
        where("from","==",currentUid),
        where("to","==",user.uid),
        where("status","==","pending")
      );

      const existingSnap = await getDocs(existingQuery);
      if(!existingSnap.empty) return;

      const div = document.createElement("div");
      div.classList.add("user-card");
      div.innerHTML = `<span>${user.username} (${user.email})</span>`;

      const btn = document.createElement("button");
      btn.classList.add("add-btn");
      btn.textContent = "Add Friend";
      btn.onclick = async ()=>{
        await addDoc(collection(db,"friendRequests"),{
          from: currentUid,
          to: user.uid,
          status: "pending"
        });
        btn.textContent="Requested";
        btn.disabled=true;
      };

      div.appendChild(btn);
      resultsDiv.appendChild(div);
    }
  });
}


// 📩 LOAD FRIEND REQUESTS
async function loadFriendRequests(){
  const q = query(
    collection(db,"friendRequests"),
    where("to","==",currentUid),
    where("status","==","pending")
  );

  const snapshot = await getDocs(q);
  const requestsDiv = document.getElementById("friendRequests");
  requestsDiv.innerHTML="";

  if(snapshot.empty){
    requestsDiv.innerHTML="No pending friend requests.";
    return;
  }

  snapshot.forEach(async (docSnap)=>{
    const req = docSnap.data();

    const userQuery = query(
      collection(db,"users"),
      where("uid","==",req.from)
    );

    const userSnap = await getDocs(userQuery);

    let senderName="Unknown";
    let senderEmail="";

    userSnap.forEach(u=>{
      senderName=u.data().username;
      senderEmail=u.data().email;
    });

    const div = document.createElement("div");
    div.classList.add("request-card");
    div.innerHTML=`<span>${senderName} (${senderEmail})</span>`;

    const acceptBtn=document.createElement("button");
    acceptBtn.classList.add("accept-btn");
    acceptBtn.textContent="Accept";
    acceptBtn.onclick=async ()=>{
      await updateDoc(doc(db,"friendRequests",docSnap.id),{
        status:"accepted"
      });
      await addDoc(collection(db,"connections"),{
        users:[req.from,currentUid]
      });
      div.remove();
    };

    const declineBtn=document.createElement("button");
    declineBtn.classList.add("decline-btn");
    declineBtn.textContent="Decline";
    declineBtn.onclick=async ()=>{
      await updateDoc(doc(db,"friendRequests",docSnap.id),{
        status:"declined"
      });
      div.remove();
    };

    div.appendChild(acceptBtn);
    div.appendChild(declineBtn);
    requestsDiv.appendChild(div);
  });
}
</script>

</body>
</html>
