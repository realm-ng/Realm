<!DOCTYPE html>
<html>
  <head>
	<title>Signup - REALM</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin:0; font-family:Arial,sans-serif; background:#0b1f3a; display:flex; justify-content:center; align-items:center; height:100vh; color:white; }
    .signup-box { background:#08172b; padding:30px; border-radius:15px; width:300px; }
    h2 { text-align:center; margin-bottom:20px; }
    input { width:100%; padding:10px; margin:5px 0; border-radius:10px; border:none; outline:none; }
    button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:10px; background:#1e90ff; color:white; cursor:pointer; }
    button:hover { background:#187bcd; }
</style>
  </head>
  <body>

	<div class="signup-box">
	  <h2>Sign Up</h2>
	  <input type="text" id="firstName" placeholder="First Name">
	  <input type="text" id="lastName" placeholder="Last Name">
	  <input type="text" id="username" placeholder="Username">
	  <input type="email" id="email" placeholder="Gmail">
	  <input type="password" id="password" placeholder="Password">
	  <button onclick="signup()">Sign Up</button>
	  <p style="text-align:center; margin-top:10px;">
		Already have an account? <a href="login.html">Login</a>
	  </p>
	</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MSG_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function signup() {
  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!firstName || !lastName || !username || !email || !password){
    alert("Please fill all fields");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    await setDoc(doc(db, "users", uid), {
      firstName,
      lastName,
      username,
      email,
      profilePic: "", // empty by default
      age: null,
      state: "",
      bio: "",
      createdAt: serverTimestamp()
    });

    alert("Signup successful!");
    window.location.href = "login.html";

  } catch(err) {
    alert(err.message);
  }
}
</script>

  </body>
</html>
