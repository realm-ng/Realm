<!DOCTYPE html>
<html>
<head>
  <title>Profile - REALM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b1f3a;
      color:white;
      padding:20px;
    }

    .container {
      max-width:400px;
      margin:auto;
      background:#08172b;
      padding:20px;
      border-radius:15px;
    }

    input, textarea {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:10px;
      border:none;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#1e90ff;
      color:white;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 style="text-align:center;">My Profile</h2>

  <input type="number" id="age" placeholder="Age (Private)">
  <input type="text" id="state" placeholder="State">
  <textarea id="bio" placeholder="Bio"></textarea>

  <button onclick="saveProfile()">Save Profile</button>
  <button onclick="goBack()" style="background:gray;">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
  authDomain: "realm-5de9c.firebaseapp.com",
  projectId: "realm-5de9c",
  storageBucket: "realm-5de9c.firebasestorage.app",
  messagingSenderId: "272718937770",
  appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, async user=>{
  if(!user){
    window.location.href="index.html";
  } else {
    currentUser = user;
    loadProfile();
  }
});

async function loadProfile(){
  const docRef = doc(db,"users",currentUser.uid);
  const snap = await getDoc(docRef);
  if(snap.exists()){
    const data = snap.data();
    document.getElementById("age").value = data.age || "";
    document.getElementById("state").value = data.state || "";
    document.getElementById("bio").value = data.bio || "";
  }
}

window.saveProfile = async function(){
  try {
    const age = document.getElementById("age").value;
    const state = document.getElementById("state").value;
    const bio = document.getElementById("bio").value;

    await setDoc(doc(db,"users",currentUser.uid),{
      age: age ? Number(age) : null,
      state: state,
      bio: bio
    }, { merge: true });

    alert("Profile Updated!");
  } catch(error){
    alert(error.message);
    console.log(error);
  }
}

window.goBack = function(){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
