<!DOCTYPE html>
<html>
<head>
  <title>REALM Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0b1f3a; color:white; display:flex; flex-direction:column; height:100vh; }
    header { background:#08172b; padding:15px; text-align:center; font-weight:bold; }
    .friend-list { background:#132f57; padding:10px; display:flex; gap:10px; overflow-x:auto; }
    .friend-btn { background:#1e90ff; border:none; border-radius:10px; padding:5px 10px; cursor:pointer; color:white; }
    .friend-btn.selected { background:#187bcd; }
    #messages { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .message { padding:10px 15px; border-radius:15px; max-width:70%; }
    .sent { background:#1e90ff; align-self:flex-end; margin-left:auto; }
    .received { background:#1a3c6e; align-self:flex-start; }
    .input-area { display:flex; padding:10px; background:#08172b; }
    input { flex:1; padding:10px; border:none; border-radius:20px; outline:none; }
    button.send-btn { margin-left:10px; padding:10px 15px; border:none; border-radius:20px; background:#1e90ff; color:white; cursor:pointer; }
    button.send-btn:hover { background:#187bcd; }
    .back { display:block; text-align:center; padding:10px; background:#132f57; text-decoration:none; color:white; }
  </style>
</head>
<body>

<header>REALM Chat</header>
<div class="friend-list" id="friendList">Loading friends...</div>
<div id="messages"></div>
<div class="input-area">
  <input type="text" id="messageInput" placeholder="Type a message...">
  <button class="send-btn" onclick="sendMessage()">Send</button>
</div>
<a href="dashboard.html" class="back">⬅ Back to Dashboard</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where, orderBy, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

// 🔑 Replace these with your own Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
  authDomain: "realm-5de9c.firebaseapp.com",
  projectId: "realm-5de9c",
  storageBucket: "realm-5de9c.firebasestorage.app",
  messagingSenderId: "272718937770",
  appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUid = null;
let selectedFriendUid = null;
const messagesDiv = document.getElementById("messages");
const friendListDiv = document.getElementById("friendList");
const messageInput = document.getElementById("messageInput");

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href="index.html";
    return;
  }
  currentUid = user.uid;
  loadFriends();
});

// Load only friends (status="accepted")
async function loadFriends(){
  const connSnap = await getDocs(collection(db,"connections"));
  const usersSnap = await getDocs(collection(db,"users"));
  
  const friends = [];
  connSnap.forEach(docSnap=>{
    const data = docSnap.data();
    if(data.status==="accepted"){
      if(data.from===currentUid) friends.push(data.to);
      if(data.to===currentUid) friends.push(data.from);
    }
  });

  friendListDiv.innerHTML="";
  if(friends.length===0){
    friendListDiv.innerHTML="<span>No friends yet</span>";
    return;
  }

  friends.forEach(uid=>{
    let friendName="Unknown";
    usersSnap.forEach(userDoc=>{
      if(userDoc.id===uid) friendName=userDoc.data().username;
    });

    const btn = document.createElement("button");
    btn.classList.add("friend-btn");
    btn.innerText=friendName;
    btn.onclick = ()=>{
      document.querySelectorAll(".friend-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedFriendUid=uid;
      loadMessages();
    };
    friendListDiv.appendChild(btn);
  });
}

let unsubscribe=null;
function loadMessages(){
  if(!selectedFriendUid) return;

  messagesDiv.innerHTML="";
  const messagesRef = collection(db,"messages");
  const q = query(messagesRef, 
    where("participants","array-contains",currentUid),
    orderBy("timestamp","asc")
  );

  if(unsubscribe) unsubscribe(); // remove old listener
  unsubscribe = onSnapshot(q, snapshot=>{
    messagesDiv.innerHTML="";
    snapshot.forEach(docSnap=>{
      const msg = docSnap.data();
      if(msg.participants.includes(selectedFriendUid)){
        const div = document.createElement("div");
        div.classList.add("message", msg.sender===currentUid ? "sent" : "received");
        div.innerText = msg.text;
        messagesDiv.appendChild(div);
      }
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

async function sendMessage(){
  if(!selectedFriendUid) return alert("Select a friend first");
  const text = messageInput.value.trim();
  if(text==="") return;

  await addDoc(collection(db,"messages"),{
    participants: [currentUid, selectedFriendUid],
    sender: currentUid,
    text,
    timestamp: new Date()
  });

  messageInput.value="";
}
</script>

</body>
</html>
