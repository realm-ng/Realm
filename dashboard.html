<!DOCTYPE html>
<html>
<head>
  <title>REALM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family:Arial;
      background: linear-gradient(145deg, #0b1f3a, #102a52);
      color:white;
      min-height:100vh;
      padding:20px;
    }

    header {
      background:#08172b;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container{
      display:flex;
      flex-direction:column;
      gap:15px;
      margin-top:20px;
    }

    .card {
      background:#132f57;
      padding:20px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .card:hover { background:#1a3c6e; }

    .icon-text {
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:bold;
    }

    .icon-text img {
      width:24px;
      height:24px;
    }
  </style>
</head>
<body>

<header>REALM Dashboard</header>

<div class="container">

  <div class="card" onclick="location.href='profile.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/user--v1.png"/> Profile
    </span>
  </div>

  <div class="card" onclick="location.href='friends.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/add-user-male.png"/> Friends
    </span>
  </div>

  <div class="card" onclick="location.href='friends.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/handshake.png"/> Friend Requests
    </span>
  </div>

  <div class="card" onclick="location.href='chat.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/chat--v1.png"/> Chat
    </span>
  </div>

</div>

</body>
</html>
