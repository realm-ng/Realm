<!DOCTYPE html>
<html>
  <head>
	<title>REALM Dashboard</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin:0; font-family:Arial; background:#0b1f3a; color:white; }
    header { background:#08172b; padding:15px; text-align:center; }
    .container {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      padding:20px;
    }
    .card {
      background:#132f57;
      padding:30px;
      border-radius:15px;
      text-align:center;
      cursor:pointer;
    }
    .card:hover { background:#1e90ff; }
</style>
  </head>
  <body>

	<header>REALM Dashboard</header>

	<div class="container">
	  <div class="card" onclick="location.href='profile.html'">👤 Profile</div>
	  <div class="card" onclick="location.href='friends.html'">👥 Friends</div>
	  <div class="card" onclick="location.href='requests.html'">🔔 Requests</div>
	  <div class="card" onclick="location.href='chatlist.html'">💬 Chat</div>
	</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
  authDomain: "realm-5de9c.firebaseapp.com",
  projectId: "realm-5de9c",
  storageBucket: "realm-5de9c.firebasestorage.app",
  messagingSenderId: "272718937770",
  appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user=>{
  if(!user) window.location.href="index.html";
});
</script>

  </body>
</html>
