<!DOCTYPE html>
<html>
<head>
  <title>REALM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family:Arial;
      background: linear-gradient(145deg, #0b1f3a, #102a52);
      color:white;
      min-height:100vh;
      padding:20px;
      display: flex;
      flex-direction: column;
    }

    header {
      background:#08172b;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container{
      display:flex;
      flex-direction:column;
      gap:15px;
      margin-top:20px;
    }

    .card {
      background:#132f57;
      padding:20px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .card:hover { background:#1a3c6e; }

    .icon-text {
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:bold;
    }

    .icon-text img {
      width:24px;
      height:24px;
    }

    /* Logout button styling */
    .logout-btn {
      margin-top: 20px;
      padding: 12px;
      text-align: center;
      background: #ff4d4d;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .logout-btn:hover { background: #e60000; }
  </style>
</head>
<body>

<header>REALM Dashboard</header>

<div class="container">

  <div class="card" onclick="location.href='profile.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/user--v1.png"/> Profile
    </span>
  </div>

  <div class="card" onclick="location.href='friends.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/add-user-male.png"/> Friends
    </span>
  </div>

  <div class="card" onclick="location.href='friends.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/handshake.png"/> Friend Requests
    </span>
  </div>

  <div class="card" onclick="location.href='chat.html'">
    <span class="icon-text">
      <img src="https://img.icons8.com/ios-glyphs/30/chat--v1.png"/> Chat
    </span>
  </div>

</div>

<!-- Logout button -->
<div class="logout-btn" id="logoutBtn">🚪 Logout</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDHCo9MHaKL_yv25Et378od3c6yXU9Hnac",
    authDomain: "realm-5de9c.firebaseapp.com",
    projectId: "realm-5de9c",
    storageBucket: "realm-5de9c.appspot.com",
    messagingSenderId: "272718937770",
    appId: "1:272718937770:web:0293fd45bdf6e9aca05ad3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Optional: redirect if not logged in
  onAuthStateChanged(auth, user => {
    if(!user) {
      window.location.href = "index.html";
    }
  });

  // Logout functionality
  const logoutBtn = document.getElementById("logoutBtn");
  logoutBtn.addEventListener("click", () => {
    signOut(auth)
      .then(() => {
        window.location.href = "index.html"; // go back to login
      })
      .catch(err => alert("Error logging out: " + err.message));
  });
</script>

</body>
</html>
